name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "25 4 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    uses: github/codeql-action/.github/workflows/codeql.yml@v4
    with:
      languages: javascript-typescript
